<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Those Who Rule 2</title>
  <meta name="description" content="Official site for Those Who Rule and Those Who Rule 2." />
  <style>
    :root {
      --bg: #081019;
      --panel: rgba(8, 13, 22, 0.84);
      --text: #eef2f7;
      --muted: #aeb7c6;
      --line: rgba(255, 255, 255, 0.1);
      --gold: #c8a96b;
      --gold-strong: #e4c789;
      --max: 1240px;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --header-h: 88px;
      --hero-parallax: 0px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #081019 0%, #0b1320 48%, #071019 100%);
      color: var(--text);
      line-height: 1.55;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img, video { display: block; max-width: 100%; }
    button, input, textarea, select { font: inherit; }

    .shell {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: var(--header-h);
      border-bottom: 1px solid var(--line);
      background: rgba(7, 11, 18, 0.8);
      backdrop-filter: blur(16px);
    }

    .header-inner {
      max-width: var(--max);
      min-height: var(--header-h);
      margin: 0 auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
    }

    .brand-switcher {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0.02em;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .brand-btn:hover,
    .brand-btn.active {
      border-color: rgba(228, 199, 137, 0.45);
      background: rgba(228, 199, 137, 0.12);
      color: var(--gold-strong);
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .main-nav a {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .main-nav a:hover { color: var(--text); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .press-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(228, 199, 137, 0.48);
      background: rgba(228, 199, 137, 0.16);
      color: #f4e6c4;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .press-btn:hover { background: rgba(228, 199, 137, 0.24); }

    .socials {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .social-link {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      transition: 0.2s ease;
    }

    .social-link img {
      width: 18px;
      height: 18px;
      object-fit: contain;
      display: block;
    }

    .social-link:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.06);
    }

    .section {
      position: relative;
      z-index: 4;
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 20px 0;
      scroll-margin-top: calc(var(--header-h) + 32px);
    }

    .hero {
      min-height: calc(100vh - var(--header-h));
      display: flex;
      align-items: stretch;
      padding: 0;
      max-width: none;
    }

    .hero-shell {
      width: 100%;
      position: relative;
      min-height: calc(100vh - var(--header-h));
      overflow: hidden;
      background: #050b14;
    }

    .hero-media {
      position: absolute;
      inset: -4% -2% 0 -2%;
      transform: translateY(var(--hero-parallax));
      will-change: transform;
    }

    .hero-media video,
    .hero-media img {
      width: 100%;
      height: 108%;
      object-fit: cover;
    }

    .hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0) 28%, rgba(0,0,0,0.45) 88%),
        linear-gradient(180deg, rgba(6,10,16,0.35) 0%, rgba(6,10,16,0.62) 48%, rgba(6,10,16,0.9) 100%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      min-height: inherit;
      max-width: var(--max);
      margin: 0 auto;
      display: block;
      padding: 42px 20px;
    }

    .hero-copy {
      max-width: 760px;
      padding-bottom: 24px;
    }

    .eyebrow {
      color: var(--gold-strong);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.78rem;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .hero-logo {
      max-width: min(560px, 82vw);
      width: 100%;
      height: auto;
      margin: 0 0 18px;
    }

    .hero-copy p {
      max-width: 56ch;
      font-size: 1.08rem;
      color: #d1d8e4;
      margin: 0 0 24px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.4);
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 0;
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      font-size: 0.98rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--gold);
      color: #1a1207;
    }

    .btn-primary:hover { background: var(--gold-strong); }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-color: rgba(255,255,255,0.16);
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.09);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 16px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(1.9rem, 3vw, 2.8rem);
      letter-spacing: -0.04em;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
      overflow: hidden;
    }

    .video-wrap {
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
    }

    .video-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .gallery-shot {
      grid-column: span 4;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
    }

    .gallery-shot img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .feature-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: 22px;
      align-items: stretch;
    }

    .feature-stage {
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
    }

    .feature-video-wrap {
      aspect-ratio: 16 / 9;
      background: #050b14;
      border-bottom: 1px solid var(--line);
    }

    .feature-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .feature-copy { padding: 22px; }
    .feature-copy h3 {
      margin: 0 0 10px;
      font-size: 1.55rem;
      letter-spacing: -0.03em;
    }

    .feature-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      min-height: 4.5em;
    }

    .feature-tabs {
      display: grid;
      gap: 12px;
    }

    .feature-tab {
      width: 100%;
      text-align: left;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .feature-tab strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .feature-tab span {
      display: block;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .feature-tab:hover,
    .feature-tab.active {
      border-color: rgba(228, 199, 137, 0.45);
      background: rgba(228, 199, 137, 0.08);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }

    .about-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      padding: 22px;
    }

    .dev-portrait {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 14px;
    }

    .about-card h3 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .about-card p { color: var(--muted); }

    .section-character {
      position: absolute;
      pointer-events: none;
      height: 700px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 18px 40px rgba(0,0,0,0.35));
      opacity: 0.96;
    }

    .section-character.left {
      left: clamp(-550px, -62vw, -120px);
      top: 50px;
    }

    .section-character.right {
      right: clamp(-550px, -62vw, -120px);
      top: 50px;
    }

    .footer {
      padding-bottom: 36px;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 1040px) {
      .header-inner {
        grid-template-columns: 1fr;
        justify-items: start;
        align-content: center;
        padding-top: 10px;
        padding-bottom: 10px;
        min-height: auto;
      }

      .main-nav { justify-content: flex-start; }
      .feature-shell,
      .about-grid { grid-template-columns: 1fr; }
      .gallery-shot { grid-column: span 6; }
      .section-character { width: min(62vw, 680px); }
    }

    @media (max-width: 760px) {
      .hero { min-height: auto; }
      .hero-shell { min-height: 640px; }
      .hero-content { padding: 24px 14px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-shot { grid-column: auto; }
      .brand-switcher {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .header-actions { flex-wrap: wrap; }
      .section { padding-left: 14px; padding-right: 14px; }
      .section-character { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .hero-media,
      .brand-btn,
      .feature-tab,
      .social-link,
      .press-btn,
      .btn { transition: none; }
    }
  </style>
</head>
<body>
  <div class="shell">

          </div>

      </div>
    </header>

    <main>
      <section class="section hero" id="top">
        <div class="hero-shell">
          <div class="hero-media">
            <video id="heroVideo" muted playsinline preload="metadata"></video>
          </div>

          <div class="hero-content">
            <div class="hero-copy">
              <div class="eyebrow" id="heroEyebrow">Upcoming Tactical RPG</div>

              <p id="heroBody"></p>

              <div class="cta-row">
                <a class="btn btn-primary" id="primaryCta" href="#" target="_blank" rel="noreferrer">View on Steam</a>
                <a class="btn btn-secondary" id="heroYoutube" href="#trailer">Watch Trailer</a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section" id="trailer">
        <img class="section-character left" id="trailerCharacter" src="assets/twr2-char-1.png" alt="" />
        <div class="section-head">
          <h2>Trailer</h2>
        </div>
        <div class="panel">
          <div class="video-wrap">
            <iframe id="trailerEmbed" src="" title="Game trailer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="section" id="gallery">
        <img class="section-character right" id="galleryCharacter" src="assets/twr2-char-2.png" alt="" />
        <div class="section-head">
          <h2>Gallery</h2>
        </div>
        <div class="panel">
          <div class="gallery-grid" id="galleryGrid"></div>
        </div>
      </section>

      <section class="section" id="features">
        <img class="section-character left" id="featuresCharacter" src="assets/twr2-char-3.png" alt="" />
        <div class="section-head">
          <h2>Features</h2>
        </div>
        <div class="panel feature-shell">
          <div class="feature-stage">
            <div class="feature-video-wrap">
              <video class="feature-video" id="featureVideo" muted playsinline preload="metadata" loop></video>
            </div>
            <div class="feature-copy">
              <h3 id="featureTitle"></h3>
              <p id="featureDescription"></p>
            </div>
          </div>
          <div class="feature-tabs" id="featureTabs"></div>
        </div>
      </section>

      <section class="section footer" id="about">
        <img class="section-character right" id="aboutCharacter" src="assets/twr2-char-4.png" alt="" />
        <div class="section-head">
          <h2>About the Developer</h2>
        </div>
        <div class="panel about-grid">
          <div class="about-card">
            <img class="dev-portrait" id="devPortrait" src="assets/dev-portrait.jpg" alt="Portrait of Eldin Turulja" />
          </div>
          <div class="about-card">
            <h3>Background</h3>
            <p id="aboutDevBody"></p>
            <p id="aboutDevBody2"></p>
            <h3 style="margin-top: 22px;">Contact</h3>
            <p>Email: <a href="mailto:eturulja@thosewhorule.com">eturulja@thosewhorule.com</a></p>

        </div>
      </section>

      <footer class="section" style="padding-bottom:36px;">
        <p style="margin: 0; text-align:center; color: var(--muted);">Copyright © eBrothers LLC. All rights reserved.</p>
      </footer>
    </main>
  </div>

      trailerCharacter: document.getElementById('trailerCharacter'),
      galleryCharacter: document.getElementById('galleryCharacter'),
      featuresCharacter: document.getElementById('featuresCharacter'),
      aboutCharacter: document.getElementById('aboutCharacter')
    };

    let currentGameKey = 'twr2';

    function setHref(el, value) {
      el.href = value;
    }

    function renderGallery(items, title) {
      els.galleryGrid.innerHTML = items.map((src, index) => `
        <figure class="gallery-shot">
          <img src="${src}" alt="${title} screenshot ${index + 1}" loading="lazy" />
        </figure>
      `).join('');
    }

    function renderFeatureTabs(features) {
      els.featureTabs.innerHTML = features.map((feature, index) => `
        <button class="feature-tab ${index === 0 ? 'active' : ''}" data-feature-index="${index}">
          <strong>${feature.title}</strong>
          <span>${feature.description}</span>
        </button>
      `).join('');

      els.featureTabs.querySelectorAll('.feature-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const index = Number(tab.dataset.featureIndex || 0);
          setFeature(index, true);
        });
      });
    }

    function setFeature(index, playVideo = true) {
      const game = games[currentGameKey];
      const feature = game.features[index];
      if (!feature) return;

      els.featureTitle.textContent = feature.title;
      els.featureDescription.textContent = feature.description;
      els.featureVideo.poster = feature.thumb;
      if (els.featureVideo.src !== new URL(feature.video, window.location.href).href) {
        els.featureVideo.src = feature.video;
      }

      els.featureTabs.querySelectorAll('.feature-tab').forEach(tab => {
        tab.classList.toggle('active', Number(tab.dataset.featureIndex) === index);
      });

      if (playVideo) {
        els.featureVideo.currentTime = 0;
        const playPromise = els.featureVideo.play();
        if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
      }
    }

    function setHeroVideo(game) {
      els.heroVideo.poster = game.heroPoster;
      els.heroVideo.src = game.heroVideo;
      els.heroVideo.loop = false;
      els.heroVideo.currentTime = 0;
      const playPromise = els.heroVideo.play();
      if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
    }

    els.heroVideo.addEventListener('ended', () => {
      els.heroVideo.pause();
    });

    function applyGame(key) {
      const game = games[key];
      if (!game) return;
      currentGameKey = key;

      document.title = game.title;
      els.heroEyebrow.textContent = game.eyebrow;
      els.heroLogo.src = game.logo;
      els.heroLogo.alt = game.title;
      els.heroBody.textContent = game.heroBody;
      els.trailerEmbed.src = game.trailerEmbed;
      els.aboutDevBody.textContent = game.aboutDevBody;
      els.aboutDevBody2.textContent = game.aboutDevBody2;

      setHref(els.primaryCta, game.steamUrl);
      els.heroYoutube.href = '#trailer';
      setHref(els.headerPressKit, game.pressUrl);
      setHref(els.steamLink, game.steamUrl);
      setHref(els.youtubeLink, game.youtubeUrl);
      setHref(els.twitterLink, game.twitterUrl);
      setHref(els.discordLink, game.discordUrl);

      renderGallery(game.gallery, game.title);
      renderFeatureTabs(game.features);
      setFeature(0, false);
      setHeroVideo(game);

      els.trailerCharacter.src = game.sectionCharacters.trailer;
      els.galleryCharacter.src = game.sectionCharacters.gallery;
      els.featuresCharacter.src = game.sectionCharacters.features;
      els.aboutCharacter.src = game.sectionCharacters.about;

      document.querySelectorAll('.brand-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.game === key);
      });

      const url = new URL(window.location);
      url.searchParams.set('game', key);
      history.replaceState({}, '', url);
    }

    function updateParallax() {
      const y = window.scrollY || window.pageYOffset;
      const heroOffset = Math.min(y * 0.06, 42);
      document.documentElement.style.setProperty('--hero-parallax', `${heroOffset}px`);
    }

    function updateFeaturePlayback() {
      const rect = document.getElementById('features').getBoundingClientRect();
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
      const visible = rect.top < viewportHeight * 0.72 && rect.bottom > viewportHeight * 0.28;
      if (visible) {
        const playPromise = els.featureVideo.play();
        if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
      } else {
        els.featureVideo.pause();
      }
    }

    function onScroll() {
      updateParallax();
      updateFeaturePlayback();
    }

    document.querySelectorAll('.brand-btn').forEach(btn => {
      btn.addEventListener('click', () => applyGame(btn.dataset.game));
    });

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);

    const initial = new URLSearchParams(window.location.search).get('game');
    applyGame(initial && games[initial] ? initial : 'twr2');
    onScroll();
  </script>
</body>
</html>
